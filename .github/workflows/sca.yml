name: SCA
on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: fluidattacks/sca-action@1.2.0
        id: scan
        with:
          scan_config_path: .github/sca-config.yaml

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-sca.csv
          path: '**/results-sca.csv'

      - name: Break build if high/critical vulnerabilities exist
        if: always()
        run: |
          if [ ! -f results-sca.csv ]; then
            echo "No output file found"
            exit 0
          fi
          FINDINGS=$(grep -E ",High,|,Critical," results-sca.csv | wc -l)
          echo "High/Critical vulnerabilities found: $FINDINGS"
          if [ "$FINDINGS" -gt 0 ]; then
            exit 1
          fi
          
      # Optional: upload findings to the GitHub Security tab
      #- name: Upload SARIF
      #  if: always()
      #  uses: github/codeql-action/upload-sarif@v4
      #  with:
      #    sarif_file: ${{ steps.scan.outputs.sarif_file }}