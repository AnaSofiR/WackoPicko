name: SAST
on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 8 * * 1" # optional: weekly full scan every Monday at 8am

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for differential scanning

      - uses: fluidattacks/sast-action@1.3.0 # Use latest released version
        id: scan
        with:
          scan_config_path: .github/sast-config.yaml

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-sast.csv
          path: '**/results-sast.csv'

      - name: Break build if high/critical vulnerabilities exist
        if: always()
        run: |
          if [ ! -f results-sast.csv ]; then
            echo "No output file found"
            exit 0
          fi
          FINDINGS=$(grep -E ",High,|,Critical," results-sast.csv | wc -l)
          echo "High/Critical vulnerabilities found: $FINDINGS"
          if [ "$FINDINGS" -gt 0 ]; then
            exit 1
          fi

